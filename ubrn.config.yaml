# uniffi-bindgen-react-native config (ADR-0007). Points at the rrn-mobile-ffi
# crate in the sibling station repo — the single FFI contract — and emits the
# JSI TypeScript + C++ turbo-module glue the app consumes.
name: RrnMobileFfi
rust:
  # The station workspace root; manifestPath selects the FFI crate within it.
  directory: ../station
  manifestPath: crates/rrn-mobile-ffi/Cargo.toml
bindings:
  cpp: cpp
  ts: src/generated
ios:
  # Default ios.directory is "ios", which collides with the app's own
  # ios/RailroadMobile sources (the podspec's source_files glob would sweep
  # up AppDelegate.swift into the RrnMobileFfi pod target). Isolate ubrn's
  # generated native glue in its own subdirectory instead.
  directory: ios/rrn-ffi
android:
  # Same collision as iOS, worse: ubrn emits a whole Android *library* project
  # here (build.gradle, AndroidManifest, CMakeLists, cpp-adapter, Package.kt),
  # and the default "android" is the app's own Gradle project. Isolate it, and
  # wire it in explicitly via settings.gradle — the exact counterpart of the
  # Podfile's `pod 'RrnMobileFfi', :path => '..'`. Autolinking never sees this
  # module on either platform: it is not an npm package.
  directory: android/rrn-ffi
  # Only what actually runs this code: the rrn-test emulator (arm64 system
  # image) and real devices. The debug .so is ~88MB per ABI, so unused targets
  # cost real build time. Add x86_64 here if an Intel emulator is ever needed.
  targets:
    - arm64-v8a
  # minSdk is 24 (see android/build.gradle); ubrn's default of 23 would build
  # against an older NDK platform than the app ships.
  apiLevel: 24
