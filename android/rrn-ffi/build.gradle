// Originally generated by uniffi-bindgen-react-native, then adopted: ubrn's
// template targets the AGP 7.2.1 era and this project is on Gradle 9.3.1 /
// AGP 8.x, where three things in it are fatal — a `package` attribute in the
// manifest, a `consumerProguardFiles` pointing at a file ubrn only emits with
// --native-bindings, and a `supportsNamespace()` branch expecting an
// `AndroidManifestNew.xml` that is never generated. This file is modelled on
// modules/rrn-discovery/android/build.gradle, which is known to build against
// this exact toolchain.
//
// `yarn ubrn:android` does NOT regenerate this (it omits --and-generate, the
// same as ubrn:ios) so these edits are stable. Regenerating by hand would
// clobber them — diff before accepting.

buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.12.0"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${rootProject.ext.has('kotlinVersion') ? rootProject.ext.get('kotlinVersion') : '2.1.20'}"
  }
}

// The app's root build.gradle sets these in `ext`; the fallbacks only matter if
// this module is ever built outside it.
def getExtOrDefault(name, fallback) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

// The ABIs we can actually link, discovered from the prebuilt Rust staticlibs
// `yarn ubrn:android` dropped in jniLibs — one directory per ABI. Derived rather
// than hardcoded so that `android.targets` in ubrn.config.yaml stays the single
// source of truth: CI overrides it with `-t x86_64` for its Intel emulator and
// needs no matching edit here. An ABI with no .a cannot link, so building for it
// would fail rather than merely go unused. If nothing has been built yet we fall
// back to the requested set and let CMakeLists report it — throwing here would
// break every Gradle invocation (`:app:tasks`, autolinking config) for anyone
// who has only ever built iOS.
def rustAbis() {
  def dir = file("src/main/jniLibs")
  def built = dir.exists()
    ? dir.listFiles().findAll { it.isDirectory() }.collect { it.name }.sort()
    : []
  return built.isEmpty() ? reactNativeArchitectures() : built
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") as List : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
// Runs RN codegen to emit NativeRrnMobileFfiSpec, the base class of
// RrnMobileFfiModule. The app generates that spec too (its package.json
// codegenConfig is what iOS consumes), but into :app's own build directory,
// which this sibling subproject cannot see — hence a second, independent
// generation here into our own package. The duplicate is inert.
apply plugin: "com.facebook.react"

android {
  namespace "com.railroadnetworkmobile"

  ndkVersion getExtOrDefault("ndkVersion", "27.1.12297006")
  compileSdk getExtOrDefault("compileSdkVersion", 36)

  defaultConfig {
    minSdk getExtOrDefault("minSdkVersion", 24)

    externalNativeBuild {
      cmake {
        arguments "-DANDROID_STL=c++_shared"
        abiFilters (*rustAbis())
      }
    }
    ndk {
      abiFilters (*rustAbis())
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  // These ship with React Native already; packaging our own copies would
  // collide at install time.
  packagingOptions {
    excludes = [
      "META-INF",
      "META-INF/**",
      "**/libc++_shared.so",
      "**/libfbjni.so",
      "**/libjsi.so",
      "**/libreactnative.so",
      "**/libreactnativejni.so",
      "**/libhermes.so",
      "**/libturbomodulejsijni.so",
    ]
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  // Replaced by `com.facebook.react:react-android:$version` by the react gradle plugin.
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
}

react {
  // The TurboModule spec (src/NativeRrnMobileFfi.ts) lives in the app's source
  // tree, two levels up — this module is a build-time home for the generated
  // glue, not a self-contained library.
  jsRootDir = file("../../src/")
  libraryName = "RrnMobileFfi"
  // Must match RrnMobileFfiModule's own package: the generated module extends
  // NativeRrnMobileFfiSpec without importing it.
  codegenJavaPackageName = "com.railroadnetworkmobile"
}
