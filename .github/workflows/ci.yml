name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn tsc --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn test --coverage

  ios-build:
    name: ios-build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      # The Rust FFI crate (ADR-0007) lives in the sibling `station` repo, not
      # here. ubrn.config.yaml points at ../station, so check it out at the
      # same relative path, pinned to the commit recorded in .station-version
      # (bump that file to pick up newer station changes).
      - name: Read pinned station commit
        id: station-version
        run: echo "sha=$(cat .station-version)" >> "$GITHUB_OUTPUT"
      - name: Checkout station (pinned FFI source)
        uses: actions/checkout@v4
        with:
          repository: railroad-network/station
          ref: ${{ steps.station-version.outputs.sha }}
          # actions/checkout refuses a `path` that escapes GITHUB_WORKSPACE
          # (e.g. `../station`), so check out inside the workspace and move
          # it to the sibling location ubrn.config.yaml's `../station` expects.
          path: station-checkout
      - name: Move station checkout next to the mobile repo
        run: mv station-checkout ../station
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('.station-version') }}
          restore-keys: ${{ runner.os }}-cargo-
      # Same toolchain handling as android-build below, which documents why
      # RUSTUP_TOOLCHAIN is needed at all: ubrn's CLI runs itself with `cargo run`
      # from this repo, and the resulting inherited RUSTUP_TOOLCHAIN outranks
      # station's rust-toolchain.toml, so the pin has to be named explicitly.
      #
      # The sim target is added by hand because rust-toolchain.toml deliberately
      # declares no Apple targets (station's own jobs would fetch an Apple stdlib
      # they never use). Running rustup from the station checkout is what puts it
      # on the pinned channel rather than the runner's default toolchain.
      - name: Resolve station's pinned Rust toolchain
        working-directory: ../station
        run: |
          set -euo pipefail
          rustup target add aarch64-apple-ios-sim
          toolchain=$(rustup show active-toolchain | cut -d' ' -f1)
          test -n "$toolchain" || { echo "Could not resolve station's toolchain"; exit 1; }
          echo "Station pins: $toolchain"
          echo "STATION_TOOLCHAIN=$toolchain" >> "$GITHUB_ENV"
      # Builds the Rust crate and assembles RailroadNetworkMobileFramework.xcframework
      # (gitignored build artifact) that RrnMobileFfi.podspec vendors. Simulator-only
      # since this job only ever boots a simulator (see below) — matches the
      # "smoke build only" scope, not a device build.
      - run: yarn ubrn:ios
        env:
          RUSTUP_TOOLCHAIN: ${{ env.STATION_TOOLCHAIN }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: .
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-
      - run: bundle exec pod install
        working-directory: ios
      # Runner images change which simulators ship pre-built (e.g. "iPhone 15"
      # was dropped in favor of newer devices), so pick whatever iPhone
      # simulator is actually available instead of hardcoding a name.
      - name: Select iOS simulator
        id: simulator
        run: |
          NAME=$(xcrun simctl list devices available -j |
            node -e '
              const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
              const device = Object.values(data.devices)
                .flat()
                .find(d => d.name.startsWith("iPhone"));
              if (device) process.stdout.write(device.name);
            ')
          if [ -z "$NAME" ]; then
            echo "::error::No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      # Smoke build only (compiles + boots the simulator, does not exercise
      # the app) — macOS runners are slow/expensive, so full E2E/screenshot
      # testing is out of scope here (M1.2, via Maestro).
      - run: yarn ios --no-packager --simulator "${{ steps.simulator.outputs.name }}"

  android-build:
    name: android-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-
      - uses: android-actions/setup-android@v3
      # The Rust FFI (ADR-0007) lives in the sibling `station` repo, exactly as
      # in ios-build above: check it out at the relative path ubrn.config.yaml
      # expects, pinned to .station-version.
      - name: Read pinned station commit
        id: station-version
        run: echo "sha=$(cat .station-version)" >> "$GITHUB_OUTPUT"
      - name: Checkout station (pinned FFI source)
        uses: actions/checkout@v4
        with:
          repository: railroad-network/station
          ref: ${{ steps.station-version.outputs.sha }}
          path: station-checkout
      - name: Move station checkout next to the mobile repo
        run: mv station-checkout ../station
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('.station-version') }}
          restore-keys: ${{ runner.os }}-cargo-android-
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      # ubrn shells out to cargo-ndk, which cross-compiles from the station
      # checkout. station's rust-toolchain.toml *declares* the Android targets,
      # but declaring is not installing: rustup only materializes them when it
      # installs that toolchain, and nothing here ever asks it to. Without this
      # step the build runs on the runner's default toolchain and dies with
      # "can't find crate for `core`".
      #
      # The working-directory is the whole point: run from station/, `rustup
      # target add` resolves through that rust-toolchain.toml and lands on the
      # channel it pins — the same toolchain cargo-ndk will use. Run from the
      # mobile repo it would land on the default toolchain and change nothing.
      # Resolve the channel station pins, and install it. Running rustup from the
      # station checkout is what makes this work: rustup reads rust-toolchain.toml
      # there, and installing the channel also installs the Android targets that
      # file declares. Read rather than hardcoded, so it cannot drift from the pin.
      - name: Resolve station's pinned Rust toolchain
        working-directory: ../station
        run: |
          set -euo pipefail
          rustup target add x86_64-linux-android
          toolchain=$(rustup show active-toolchain | cut -d' ' -f1)
          test -n "$toolchain" || { echo "Could not resolve station's toolchain"; exit 1; }
          echo "Station pins: $toolchain"
          echo "STATION_TOOLCHAIN=$toolchain" >> "$GITHUB_ENV"
      # This job's emulator is x86_64 (Intel runner), while ubrn.config.yaml
      # targets arm64-v8a for real devices and local emulators — so override the
      # ABI here rather than making every developer build a target only CI uses.
      # :rrn-ffi derives its abiFilters from whichever jniLibs it finds, so this
      # flag is the only place the CI ABI is named.
      # cargo-ndk needs the NDK the app links against — android/build.gradle's
      # `ndkVersion`. The runner preinstalls a different r27 patch, and AGP only
      # fetches the pinned one during the Gradle build, which is too late for the
      # step below. Installing it up front makes that later fetch a no-op.
      # Read rather than duplicated: a hardcoded copy that drifted from
      # build.gradle would cross-compile against one NDK and link against
      # another, which fails quietly rather than loudly.
      - name: Install the NDK the app pins
        run: |
          set -euo pipefail
          ndk=$(awk -F'"' '/ndkVersion *=/ {print $2; exit}' android/build.gradle)
          test -n "$ndk" || { echo "No ndkVersion in android/build.gradle"; exit 1; }
          echo "Pinned NDK: $ndk"
          echo "NDK_VERSION=$ndk" >> "$GITHUB_ENV"
          sdkmanager --install "ndk;$ndk"
      - name: Cross-compile the Rust FFI for the emulator ABI
        run: yarn uniffi-bindgen-react-native build android -t x86_64
        env:
          # station's rust-toolchain.toml cannot pin this build on its own, so
          # name the toolchain explicitly. ubrn's CLI launches itself with
          # `cargo run` from *this* repo, which has no rust-toolchain.toml: rustup
          # resolves the runner's default channel and exports RUSTUP_TOOLCHAIN
          # into ubrn's environment. cargo-ndk then inherits it when ubrn shells
          # out inside station, and RUSTUP_TOOLCHAIN outranks a rust-toolchain.toml
          # -- so the build silently ran on default stable, which has no Android
          # targets, and died with "can't find crate for `core`".
          #
          # Setting it here overrides that inherited value with station's pin, so
          # ubrn and cargo-ndk agree on the toolchain the targets are installed on.
          RUSTUP_TOOLCHAIN: ${{ env.STATION_TOOLCHAIN }}
          # Both, and matching: cargo-ndk warns when they disagree.
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Jetifier is obsolete on current React Native (AndroidX is the
      # default; the CLI no longer exposes a --no-jetifier flag).
      # Smoke build only (compiles + installs on a booted emulator, does not
      # exercise the app) — mirrors the ios-build scope; full E2E/screenshot
      # testing is out of scope here (M1.2, via Maestro).
      - name: Run yarn android --no-packager on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # Gradle reads ORG_GRADLE_PROJECT_* as project properties. Constrains
          # the app to the one ABI the Rust was built for above; without it the
          # build fans out to all four and fails on the three with no staticlib.
          ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: yarn android --no-packager
