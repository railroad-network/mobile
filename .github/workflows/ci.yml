name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn tsc --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn test --coverage

  ios-build:
    name: ios-build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      # The Rust FFI crate (ADR-0007) lives in the sibling `station` repo, not
      # here. ubrn.config.yaml points at ../station, so check it out at the
      # same relative path, pinned to the commit recorded in .station-version
      # (bump that file to pick up newer station changes).
      - name: Read pinned station commit
        id: station-version
        run: echo "sha=$(cat .station-version)" >> "$GITHUB_OUTPUT"
      - name: Checkout station (pinned FFI source)
        uses: actions/checkout@v4
        with:
          repository: railroad-network/station
          ref: ${{ steps.station-version.outputs.sha }}
          # actions/checkout refuses a `path` that escapes GITHUB_WORKSPACE
          # (e.g. `../station`), so check out inside the workspace and move
          # it to the sibling location ubrn.config.yaml's `../station` expects.
          path: station-checkout
      - name: Move station checkout next to the mobile repo
        run: mv station-checkout ../station
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('.station-version') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: rustup target add aarch64-apple-ios-sim
      # Builds the Rust crate and assembles RailroadNetworkMobileFramework.xcframework
      # (gitignored build artifact) that RrnMobileFfi.podspec vendors. Simulator-only
      # since this job only ever boots a simulator (see below) — matches the
      # "smoke build only" scope, not a device build.
      - run: yarn ubrn:ios
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: .
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-
      - run: bundle exec pod install
        working-directory: ios
      # Runner images change which simulators ship pre-built (e.g. "iPhone 15"
      # was dropped in favor of newer devices), so pick whatever iPhone
      # simulator is actually available instead of hardcoding a name.
      - name: Select iOS simulator
        id: simulator
        run: |
          NAME=$(xcrun simctl list devices available -j |
            node -e '
              const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
              const device = Object.values(data.devices)
                .flat()
                .find(d => d.name.startsWith("iPhone"));
              if (device) process.stdout.write(device.name);
            ')
          if [ -z "$NAME" ]; then
            echo "::error::No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      # Smoke build only (compiles + boots the simulator, does not exercise
      # the app) — macOS runners are slow/expensive, so full E2E/screenshot
      # testing is out of scope here (M1.2, via Maestro).
      - run: yarn ios --no-packager --simulator "${{ steps.simulator.outputs.name }}"

  android-build:
    name: android-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-
      - uses: android-actions/setup-android@v3
      # The Rust FFI (ADR-0007) lives in the sibling `station` repo, exactly as
      # in ios-build above: check it out at the relative path ubrn.config.yaml
      # expects, pinned to .station-version.
      - name: Read pinned station commit
        id: station-version
        run: echo "sha=$(cat .station-version)" >> "$GITHUB_OUTPUT"
      - name: Checkout station (pinned FFI source)
        uses: actions/checkout@v4
        with:
          repository: railroad-network/station
          ref: ${{ steps.station-version.outputs.sha }}
          path: station-checkout
      - name: Move station checkout next to the mobile repo
        run: mv station-checkout ../station
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('.station-version') }}
          restore-keys: ${{ runner.os }}-cargo-android-
      # ubrn shells out to cargo-ndk. No `rustup target add` step is needed:
      # station's rust-toolchain.toml declares the Android targets, so rustup
      # installs them against the channel it pins. Adding them by hand from this
      # directory would land them on the *default* toolchain instead, and the
      # build would fail with a misleading "can't find crate for `core`".
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      # This job's emulator is x86_64 (Intel runner), while ubrn.config.yaml
      # targets arm64-v8a for real devices and local emulators — so override the
      # ABI here rather than making every developer build a target only CI uses.
      # :rrn-ffi derives its abiFilters from whichever jniLibs it finds, so this
      # flag is the only place the CI ABI is named.
      - name: Cross-compile the Rust FFI for the emulator ABI
        run: yarn uniffi-bindgen-react-native build android -t x86_64
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Jetifier is obsolete on current React Native (AndroidX is the
      # default; the CLI no longer exposes a --no-jetifier flag).
      # Smoke build only (compiles + installs on a booted emulator, does not
      # exercise the app) — mirrors the ios-build scope; full E2E/screenshot
      # testing is out of scope here (M1.2, via Maestro).
      - name: Run yarn android --no-packager on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # Gradle reads ORG_GRADLE_PROJECT_* as project properties. Constrains
          # the app to the one ABI the Rust was built for above; without it the
          # build fans out to all four and fails on the three with no staticlib.
          ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: yarn android --no-packager
